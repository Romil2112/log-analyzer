version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loganalyzer
      POSTGRES_PASSWORD: loganalyzer
      POSTGRES_DB: log_analyzer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loganalyzer -d log_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 5

  analyzer:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LOG_ANALYZER_DSN: "postgresql://loganalyzer:loganalyzer@postgres:5432/log_analyzer"
    volumes:
      - ./logs:/app/logs:ro
      - ./reports:/app/reports
    command: ["/app/logs/auth.log", "--report", "/app/reports/report.html"]

volumes:
  pgdata:
